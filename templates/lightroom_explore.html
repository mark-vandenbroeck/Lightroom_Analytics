<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightroom Analytics - Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; appearance: none; }
    </style>
</head>
<body class="min-h-screen p-8 text-slate-200 custom-scrollbar">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Navigation -->
        <nav class="flex flex-wrap justify-center gap-4 pb-2">
            <a href="/" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">Dashboard</a>
            <a href="/explore" class="px-5 py-2.5 bg-blue-600 rounded-xl font-medium shadow-md text-white whitespace-nowrap">Explore</a>
            <a href="/exif" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">EXIF Analytics</a>
            <a href="/scatter" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">Correlations</a>
            <a href="/hitrate" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>Hit Rates</a>
            <a href="/edits" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>Quality & Edits</a>
            <a href="/lensprofile" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>Lens Profiles</a>
            <a href="/config" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">Lens Config</a>
        </nav>

        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center glass p-6 rounded-2xl shadow-xl gap-4">
            <div>
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight">
                    Data Explorer
                </h1>
                <p class="text-slate-400 mt-1 text-sm">Filter your photography metrics by Camera and Lens</p>
            </div>
            
            <div class="flex flex-col sm:flex-row flex-wrap gap-4 w-full md:w-auto mt-4 md:mt-0">
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">From Month</label>
                    <input type="month" id="dateFrom" class="w-full px-4 py-2 bg-slate-800/80 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm text-slate-200 cursor-pointer hover:border-slate-500 transition-colors">
                </div>
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">To Month</label>
                    <input type="month" id="dateTo" class="w-full px-4 py-2 bg-slate-800/80 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm text-slate-200 cursor-pointer hover:border-slate-500 transition-colors">
                </div>
                <div class="flex-1 min-w-[160px]">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Camera Filter</label>
                    <select id="cameraFilter" class="w-full px-4 py-2 bg-slate-800/80 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm text-slate-200 cursor-pointer hover:border-slate-500 transition-colors">
                        <option value="">All Cameras</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[180px]">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Lens Filter</label>
                    <select id="lensFilter" class="w-full px-4 py-2 bg-slate-800/80 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm text-slate-200 cursor-pointer hover:border-slate-500 transition-colors">
                        <option value="">All Lenses</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Empty State -->
        <div id="noDataState" class="glass rounded-2xl shadow-xl p-12 text-center hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-slate-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            <h3 class="text-xl font-medium text-slate-300">No Data Available</h3>
            <p class="text-slate-500 mt-2">Try adjusting your filters or importing a catalog.</p>
        </div>

        <!-- Charts Container -->
        <div id="chartsContainer" class="glass p-6 rounded-2xl shadow-xl h-[500px] relative flex flex-col hover:-translate-y-1 transition-transform duration-300">
            <h2 class="text-lg font-semibold mb-4 w-full text-left text-slate-100 flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-blue-400"></span> Photos & Picks Overview
            </h2>
            <div class="flex-grow w-full relative">
                <canvas id="combinedChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        // Chart configuration
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";
        const gridConfig = { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false };
        const baseOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', titleColor: '#fff', bodyColor: '#cbd5e1', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 12, displayColors: true, cornerRadius: 8 }
            },
            scales: { x: { grid: gridConfig }, y: { grid: gridConfig, beginAtZero: true } }
        };

        let combinedChart;

        function initCharts() {
            const ctx = document.getElementById('combinedChart').getContext('2d');
            
            // Picks gradient
            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(251, 191, 36, 0.4)'); // amber-400
            gradient.addColorStop(1, 'rgba(251, 191, 36, 0.0)');

            combinedChart = new Chart(ctx, {
                type: 'bar', // Base type
                data: { 
                    labels: [], 
                    datasets: [
                        { 
                            type: 'line',
                            label: 'Total Picks', 
                            data: [], 
                            borderColor: '#fbbf24', 
                            backgroundColor: gradient, 
                            tension: 0.4, 
                            fill: true, 
                            pointBackgroundColor: '#0f172a', 
                            pointBorderColor: '#fbbf24', 
                            pointBorderWidth: 2, 
                            pointHoverRadius: 6
                        },
                        { 
                            type: 'bar',
                            label: 'Photos Captured', 
                            data: [], 
                            backgroundColor: 'rgba(96, 165, 250, 0.7)', 
                            hoverBackgroundColor: 'rgba(96, 165, 250, 1)', 
                            borderRadius: 4
                        }
                    ] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { 
                            display: true,
                            position: 'top',
                            labels: { color: '#cbd5e1', usePointStyle: true, boxWidth: 8 }
                        },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', titleColor: '#fff', bodyColor: '#cbd5e1', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 12, displayColors: true, cornerRadius: 8 }
                    },
                    scales: { 
                        x: { grid: gridConfig }, 
                        y: { 
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: gridConfig, 
                            beginAtZero: true,
                            title: { display: true, text: 'Amount', color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        async function loadFilters() {
            try {
                const res = await fetch('/api/filters');
                const data = await res.json();
                
                const cameraSelect = document.getElementById('cameraFilter');
                data.cameras.forEach(cam => {
                    const opt = document.createElement('option');
                    opt.value = cam;
                    opt.textContent = cam;
                    cameraSelect.appendChild(opt);
                });

                const lensSelect = document.getElementById('lensFilter');
                data.lenses.forEach(lens => {
                    const opt = document.createElement('option');
                    opt.value = lens;
                    opt.textContent = lens;
                    lensSelect.appendChild(opt);
                });
            } catch (err) { console.error("Filter load failed", err); }
        }

        async function loadData() {
            const cam = document.getElementById('cameraFilter').value;
            const lens = document.getElementById('lensFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            
            let url = '/api/explore_metrics?';
            if (cam) url += `camera=${encodeURIComponent(cam)}&`;
            if (lens) url += `lens=${encodeURIComponent(lens)}&`;
            if (dateFrom) url += `start_month=${encodeURIComponent(dateFrom)}&`;
            if (dateTo) url += `end_month=${encodeURIComponent(dateTo)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                
                const container = document.getElementById('chartsContainer');
                const empty = document.getElementById('noDataState');

                if (data.error || !data.labels || data.labels.length === 0) {
                    container.classList.add('hidden');
                    empty.classList.remove('hidden');
                    return;
                }
                
                empty.classList.add('hidden');
                container.classList.remove('hidden');

                combinedChart.data.labels = data.labels;
                // Index 0 is Picks (Line), Index 1 is Photos (Bar)
                combinedChart.data.datasets[1].data = data.total_photos;
                combinedChart.data.datasets[0].data = data.pick_count;
                combinedChart.update();
            } catch (err) { console.error("Data load failed", err); }
        }

        document.getElementById('cameraFilter').addEventListener('change', loadData);
        document.getElementById('lensFilter').addEventListener('change', loadData);
        document.getElementById('dateFrom').addEventListener('change', loadData);
        document.getElementById('dateTo').addEventListener('change', loadData);

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadFilters().then(loadData);
        });
    </script>
</body>
</html>
