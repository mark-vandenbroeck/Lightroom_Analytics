<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightroom Analytics - Lens Config</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-8 text-slate-200 custom-scrollbar">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Navigation -->
        <nav class="flex flex-wrap justify-center gap-4 pb-2">
            <a href="/" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">Dashboard</a>
            <a href="/explore" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">Explore</a>
            <a href="/exif" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">EXIF Analytics</a>
            <a href="/scatter" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap">Correlations</a>
            <a href="/hitrate" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>Hit Rates</a>
            <a href="/edits" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>Quality & Edits</a>
            <a href="/lensprofile" class="px-5 py-2.5 glass rounded-xl font-medium hover:bg-slate-700 hover:text-white transition-colors whitespace-nowrap flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>Lens Profiles</a>
            <a href="/config" class="px-5 py-2.5 bg-blue-600 rounded-xl font-medium shadow-md text-white whitespace-nowrap">Lens Config</a>
        </nav>

        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center glass p-6 rounded-2xl shadow-xl gap-4">
            <div>
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight">
                    Lens Configuration
                </h1>
                <p class="text-slate-400 mt-1 text-sm">Group different lens names from EXIF data into normalized display names.</p>
            </div>
            
            <button id="saveBtn" class="px-6 py-3 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 font-semibold shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] transition-all flex items-center gap-2 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                <span>Save Mappings</span>
            </button>
        </header>

        <!-- Save Status -->
        <div id="statusAlert" class="p-4 rounded-xl hidden text-sm font-semibold flex items-center gap-2 shadow-inner transition-all">
            <span id="statusIcon" class="flex-shrink-0 w-5 h-5 flex items-center justify-center"></span>
            <span id="statusText"></span>
        </div>

        <!-- Table Container -->
        <div class="glass rounded-2xl shadow-xl overflow-hidden border border-slate-700/50">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-slate-800/80 text-slate-300 border-b border-slate-700/50">
                        <tr>
                            <th class="px-6 py-4 font-semibold w-1/2">Original EXIF Lens Name</th>
                            <th class="px-6 py-4 font-semibold w-1/2">Display Group Name (Optional)</th>
                        </tr>
                    </thead>
                    <tbody id="lensTableBody" class="divide-y divide-slate-700/50">
                        <tr>
                            <td colspan="2" class="px-6 py-8 text-center text-slate-500">
                                <div class="w-5 h-5 border-2 border-slate-500/30 border-t-slate-300 rounded-full animate-spin mx-auto mb-2"></div>
                                Loading lenses...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentMappings = [];

        async function fetchMappings() {
            try {
                const res = await fetch('/api/mappings');
                currentMappings = await res.json();
                renderTable();
            } catch (err) {
                console.error("Failed to load mappings", err);
                document.getElementById('lensTableBody').innerHTML = `
                    <tr><td colspan="2" class="px-6 py-8 text-center text-red-500">Failed to load data. Ensure database is imported.</td></tr>
                `;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('lensTableBody');
            
            if (!currentMappings || currentMappings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="2" class="px-6 py-8 text-center text-slate-500">No lenses found in database.</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            
            currentMappings.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/30 transition-colors group";
                
                tr.innerHTML = `
                    <td class="px-6 py-4 text-slate-300 font-medium">
                        ${item.original}
                    </td>
                    <td class="px-6 py-3">
                        <input type="text" data-index="${index}" class="mapping-input w-full md:w-3/4 px-4 py-2 bg-slate-900/50 border border-slate-700 group-hover:border-slate-500 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-emerald-400 placeholder:text-slate-600 transition-colors" 
                               value="${item.group || ''}" placeholder="E.g. 50mm f/1.8">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin mx-auto"></div>`;
            btn.disabled = true;

            const inputs = document.querySelectorAll('.mapping-input');
            const dataToSave = [];
            
            inputs.forEach(input => {
                const index = input.getAttribute('data-index');
                const groupVal = input.value.trim();
                dataToSave.push({
                    original: currentMappings[index].original,
                    group: groupVal
                });
            });

            try {
                const res = await fetch('/api/mappings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                });
                
                const alertBox = document.getElementById('statusAlert');
                const alertText = document.getElementById('statusText');
                const alertIcon = document.getElementById('statusIcon');
                
                alertBox.classList.remove('hidden', 'bg-red-900/40', 'border-red-500/30', 'text-red-300');
                
                if (res.ok) {
                    alertBox.classList.add('bg-emerald-900/40', 'border', 'border-emerald-500/30', 'text-emerald-300');
                    alertIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>`;
                    alertText.textContent = "Lens mappings saved successfully!";
                } else {
                    throw new Error("Server rejected save request");
                }
                
                setTimeout(() => { alertBox.classList.add('hidden'); }, 3000);
            } catch (err) {
                const alertBox = document.getElementById('statusAlert');
                alertBox.classList.remove('hidden', 'bg-emerald-900/40', 'border-emerald-500/30', 'text-emerald-300');
                alertBox.classList.add('bg-red-900/40', 'border', 'border-red-500/30', 'text-red-300');
                document.getElementById('statusText').textContent = "Failed to save mappings: " + err.message;
                document.getElementById('statusIcon').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>`;
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', fetchMappings);
    </script>
</body>
</html>
